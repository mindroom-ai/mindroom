# MindRoom Configuration
# Generated by: mindroom config init
# Docs: https://github.com/mindroom-ai/mindroom

# Define your AI models
models:
  default:
    provider: anthropic  # Options: anthropic, openai, google, vertexai_claude, openrouter, ollama
    id: claude-sonnet-4-6

# Define your agents
agents:
  assistant:
    display_name: Assistant
    role: A helpful general-purpose assistant
    model: default
    rooms:
      - lobby
    accept_invites: true  # Accept direct room invites and auto-join invited rooms
    tools: []
    # Tools can be plain strings or single-key dicts with per-agent config overrides:
    # tools:
    #   - file
    #   - shell:
    #       extra_env_passthrough: "DAWARICH_*"
    #       enable_run_shell_command: true
    instructions:
      - Be helpful and conversational

# Router configuration (routes messages to the right agent)
router:
  model: default
  accept_invites: true  # Accept authorized room invites and preserve them across restarts

# Internal MindRoom user account (optional)
# Set username before first run; once the account is created, the username is fixed.
# You can still change display_name later.
mindroom_user:
  username: mindroom_user
  display_name: MindRoomUser

# Matrix room access/discoverability (optional)
# Default keeps current private behavior. Enable multi_user for OIDC/multi-human onboarding.
matrix_room_access:
  mode: single_user_private         # Options: single_user_private, multi_user
  multi_user_join_rule: public      # In multi_user mode: public or knock
  publish_to_room_directory: false  # In multi_user mode: publish managed rooms to directory
  invite_only_rooms: []             # Room keys/aliases/IDs that stay invite-only/private
  reconcile_existing_rooms: false   # When true, migrate current managed rooms to target policy

# Optional root Matrix Space for grouping managed rooms in clients that support Spaces.
matrix_space:
  enabled: true
  name: MindRoom

# Persistent Matrix thread history cache.
# This cache is always enabled.
# SQLite is the default for local installs.
# For shared runtime storage, set backend: postgres and provide MINDROOM_EVENT_CACHE_DATABASE_URL.
# MindRoom auto-installs the postgres extra when psycopg is missing.
# Set MINDROOM_NO_AUTO_INSTALL_TOOLS=1 to disable optional dependency installation.
# Cache backend settings are read at startup and changing them requires a restart.
cache:
  backend: sqlite
  db_path: mindroom_data/event_cache.db
  # database_url_env: MINDROOM_EVENT_CACHE_DATABASE_URL
  # namespace: default

# Optional debug logging for pre-provider LLM request assembly data.
# This writes sensitive prompts, messages, tools, and model params to JSONL.
# It does not capture the final provider-specific wire payload.
# Leave disabled unless you are actively debugging request assembly.
# debug:
#   log_llm_requests: true
#   llm_request_log_dir: ./mindroom_data/logs/llm_requests

# Default local embedder for knowledge indexing.
memory:
  embedder:
    provider: sentence_transformers
    config:
      model: sentence-transformers/all-MiniLM-L6-v2

# Authorization defaults (recommended for public deployments)
# Replace __MINDROOM_OWNER_USER_ID_FROM_PAIRING__ with your Matrix user ID,
# e.g. @alice:mindroom.chat.
authorization:
  default_room_access: false
  global_users:
    # Replace with your Matrix user ID (example: @alice:mindroom.chat).
    - __MINDROOM_OWNER_USER_ID_FROM_PAIRING__
  agent_reply_permissions:
    "*":
      # Replace with your Matrix user ID (example: @alice:mindroom.chat).
      - __MINDROOM_OWNER_USER_ID_FROM_PAIRING__

# Optional tool approval rules.
# Rules are evaluated in order and the first match wins.
# React with `✅` to approve, or reply to the approval card to deny with a reason.
# Only the original human requester can resolve a pending approval.
# Agent-authored or system-authored tool calls are denied instead of entering approval flow.
# OpenAI-compatible `/v1` requests hide tool functions that match required-approval rules.
# Script-based rules are also hidden on `/v1` because approval cards need Matrix context.
# tool_approval:
#   default: auto_approve
#   timeout_days: 7
#   rules:
#     - match: slack_*
#       action: require_approval
#     - match: run_shell_command
#       script: ./approval_scripts/shell_review.py
#       timeout_days: 3

# Default settings for all agents
defaults:
  tools:
    - scheduler
  markdown: true

# Advanced plugin example (optional)
# plugins:
#   - path: ./plugins/personal-context
#     settings:
#       dawarich_url: http://dawarich.local
#     hooks:
#       enrich_with_location:
#         priority: 20
#       audit_messages:
#         enabled: false
