apiVersion: v1
kind: Service
metadata:
  name: {{ include "mindroom-tuwunel.fullname" . }}
  labels:
    {{- include "mindroom-tuwunel.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: matrix
      protocol: TCP
      name: matrix
  selector:
    {{- include "mindroom-tuwunel.selectorLabels" . | nindent 4 }}
