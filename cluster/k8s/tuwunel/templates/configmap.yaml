{{- if and .Values.config.create (not .Values.config.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mindroom-tuwunel.configMapName" . }}
  labels:
    {{- include "mindroom-tuwunel.labels" . | nindent 4 }}
data:
  {{ .Values.config.key }}: |
{{ include "mindroom-tuwunel.config" . | indent 4 }}
{{- end }}
