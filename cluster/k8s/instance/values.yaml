customer: demo
baseDomain: mindroom.chat  # Base domain for all services
storage: 10Gi  # More storage for Matrix data
storageClassName: hcloud-volumes  # Override to local cluster storage class (for example `standard` in kind)
storageAccessMode: ReadWriteOnce  # MindRoom storage access mode. Set ReadWriteMany for multi-node shared-worker storage.
synapseStorageAccessMode: ReadWriteOnce
storagePath: "/mindroom_data"  # Base path inside container for persisted state

mindroomResources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

synapseResources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

sandboxRunnerResources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# Docker images
mindroom_image: ghcr.io/mindroom-ai/mindroom:latest
mindroom_image_pull_policy: Always
synapse_image: matrixdotorg/synapse:latest
synapse_image_pull_policy: Always
imagePullSecrets: []

matrixOidc:
  enabled: "false"
  issuer: ""
  clientId: "mindroom-synapse"
  clientSecret: ""
authorizationGlobalUsers: []
matrixRoomAccess:
  mode: single_user_private
  multiUserJoinRule: public
  publishToRoomDirectory: false
  inviteOnlyRooms: []
  reconcileExistingRooms: false
matrixAutoJoinRoomKeys: []
matrixHomeserverStartupTimeoutSeconds: 0  # 0 means wait forever for Matrix at startup.
workerBackend: static_runner  # `static_runner` keeps the shared sidecar; `kubernetes` creates dedicated worker pods
workerCleanupIntervalSeconds: 30
controlPlaneNodeName: ""  # Optional explicit node pin for the control plane and dedicated workers when using shared ReadWriteOnce storage.
kubernetesWorkerImage: ""  # Defaults to mindroom_image when empty
kubernetesWorkerImagePullPolicy: ""  # Defaults to mindroom_image_pull_policy when empty
kubernetesWorkerServiceAccountName: ""  # ServiceAccount used by dedicated worker pods. Defaults to the namespace `default`.
kubernetesWorkerNamePrefix: "mindroom-worker"
kubernetesWorkerStorageSubpathPrefix: "workers"
kubernetesWorkerPort: 8766
kubernetesWorkerReadyTimeoutSeconds: 60
kubernetesWorkerIdleTimeoutSeconds: 1800
kubernetesWorkerEnableServiceLinks: false

networkPolicy:
  dns:
    enabled: true
    to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
        podSelector:
          matchExpressions:
            - key: k8s-app
              operator: In
              values:
                - kube-dns
                - coredns
  publicInternet:
    enabled: true
    cidr: 0.0.0.0/0
    except:
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 224.0.0.0/4
      - 240.0.0.0/4
    ports:
      - 80
      - 443
  # Egress rules added to every instance pod.
  extraEgress: []
  # Egress rules added only to dedicated worker pods, for private broker services.
  workerExtraEgress: []
  # Egress rules added only to the primary runtime pod, for private API-server CIDRs.
  controlPlaneExtraEgress: []

# API keys and secrets (referenced via Secret in deployment)
# Production provisioner deploys create this Secret outside Helm so secret values
# do not land in Helm release history.
instanceSecrets:
  create: true
  name: ""
  hash: ""
openai_key: ""
anthropic_key: ""
google_key: ""
openrouter_key: ""
deepseek_key: ""
sandbox_proxy_token: ""
credentials_encryption_key: ""
matrixRegistrationSharedSecret: ""

# Supabase (shared auth)
supabaseUrl: ""
supabaseAnonKey: ""
supabaseServiceKey: ""

trustedUpstreamAuth:
  enabled: "false"
  userIdHeader: ""
  emailHeader: ""
  matrixUserIdHeader: ""
  emailToMatrixUserIdTemplate: ""
  requireJwt: "false"
  jwtHeader: ""
  jwksUrl: ""
  jwtAudience: ""
  jwtIssuer: ""
  jwtEmailClaim: "email"
  jwtUserIdClaim: ""
  jwtMatrixUserIdClaim: ""

# Matrix admin user (leave empty and set via --set or Secret)
matrix_admin_password: ""
