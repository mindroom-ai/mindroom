apiVersion: v1
kind: Service
metadata:
  name: mindroom-{{ .Values.customer }}
  namespace: mindroom-instances
  labels:
    app: mindroom
    customer: {{ .Values.customer | quote }}
spec:
  type: ClusterIP
  ports:
  - port: 8765
    targetPort: 8765  # MindRoom runtime port for the bundled dashboard and API
    name: api
  selector:
    app: mindroom
    customer: {{ .Values.customer | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: synapse-{{ .Values.customer }}
  namespace: mindroom-instances
  labels:
    app: synapse
    customer: {{ .Values.customer | quote }}
spec:
  type: ClusterIP
  ports:
  - port: 8008
    targetPort: 8008
    name: http
  selector:
    app: synapse
    customer: {{ .Values.customer | quote }}
