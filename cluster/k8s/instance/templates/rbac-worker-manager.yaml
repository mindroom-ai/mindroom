{{- if eq (.Values.workerBackend | default "static_runner") "kubernetes" }}
{{- $workerManagerServiceAccountName := printf "mindroom-worker-manager-%s" .Values.customer -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mindroom-worker-manager-{{ .Values.customer }}
  namespace: mindroom-instances
  labels:
    app: mindroom
    customer: {{ .Values.customer | quote }}
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch", "create", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mindroom-worker-manager-{{ .Values.customer }}
  namespace: mindroom-instances
  labels:
    app: mindroom
    customer: {{ .Values.customer | quote }}
subjects:
- kind: ServiceAccount
  name: {{ $workerManagerServiceAccountName }}
  namespace: mindroom-instances
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mindroom-worker-manager-{{ .Values.customer }}
{{- end }}
