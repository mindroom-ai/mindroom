{{- $workerBackend := .Values.workerBackend | default "static_runner" -}}
{{- $workerPort := 8766 -}}
{{- if eq $workerBackend "kubernetes" -}}
{{- $workerPort = (.Values.kubernetesWorkerPort | default 8766) -}}
{{- end -}}
{{- $networkPolicy := .Values.networkPolicy | default (dict) -}}
{{- $dns := $networkPolicy.dns | default (dict) -}}
{{- $dnsEnabled := true -}}
{{- if hasKey $dns "enabled" -}}
{{- $dnsEnabled = $dns.enabled -}}
{{- end -}}
{{- $publicInternet := $networkPolicy.publicInternet | default (dict) -}}
{{- $publicInternetEnabled := true -}}
{{- if hasKey $publicInternet "enabled" -}}
{{- $publicInternetEnabled = $publicInternet.enabled -}}
{{- end -}}
{{- $publicInternetExcept := get $publicInternet "except" | default (list) -}}
{{- $publicInternetPorts := $publicInternet.ports | default (list 80 443) -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: instance-traffic-controls-{{ .Values.customer }}
  namespace: mindroom-instances
  labels:
    app.kubernetes.io/name: mindroom-instance
    customer: {{ .Values.customer | quote }}
spec:
  podSelector:
    matchLabels:
      customer: {{ .Values.customer | quote }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow only ingress-nginx and same-instance pods to reach the public service ports.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/component: controller
          app.kubernetes.io/name: ingress-nginx
    - podSelector:
        matchLabels:
          customer: {{ .Values.customer | quote }}
    ports:
    - port: 8765    # MindRoom runtime (bundled dashboard + API)
    - port: 8008    # synapse HTTP
  # Allow the primary runtime to reach dedicated worker pods.
  - from:
    - podSelector:
        matchLabels:
          app: mindroom
          customer: {{ .Values.customer | quote }}
    ports:
    - port: {{ $workerPort }}
  egress:
  # Allow intra-instance traffic between MindRoom and Synapse pods.
  - to:
    - podSelector:
        matchLabels:
          customer: {{ .Values.customer | quote }}
    ports:
    - port: 8008
    - port: 8765
    - port: {{ $workerPort }}
  # Allow DNS
  {{- if $dnsEnabled }}
  - to:
    {{- toYaml $dns.to | nindent 4 }}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  {{- end }}
  # Allow public HTTP/HTTPS while excluding metadata, link-local, private, multicast, and reserved networks.
  {{- if $publicInternetEnabled }}
  - to:
    - ipBlock:
        cidr: {{ $publicInternet.cidr | default "0.0.0.0/0" | quote }}
        {{- with $publicInternetExcept }}
        except:
          {{- toYaml . | nindent 10 }}
        {{- end }}
    ports:
    {{- range $publicInternetPorts }}
    - protocol: TCP
      port: {{ . }}
    {{- end }}
  {{- end }}
  {{- with $networkPolicy.extraEgress }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- with $networkPolicy.workerExtraEgress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: instance-worker-egress-{{ $.Values.customer }}
  namespace: mindroom-instances
  labels:
    app.kubernetes.io/name: mindroom-instance-worker
    customer: {{ $.Values.customer | quote }}
spec:
  podSelector:
    matchLabels:
      customer: {{ $.Values.customer | quote }}
      mindroom.ai/component: worker
      app.kubernetes.io/managed-by: mindroom
      app.kubernetes.io/name: mindroom-worker
  policyTypes:
  - Egress
  egress:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- with $networkPolicy.controlPlaneExtraEgress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: instance-control-plane-egress-{{ $.Values.customer }}
  namespace: mindroom-instances
  labels:
    app.kubernetes.io/name: mindroom-instance-control-plane
    customer: {{ $.Values.customer | quote }}
spec:
  podSelector:
    matchLabels:
      app: mindroom
      customer: {{ $.Values.customer | quote }}
  policyTypes:
  - Egress
  egress:
  {{- toYaml . | nindent 2 }}
{{- end }}
