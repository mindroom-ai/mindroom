---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mindroom-storage-{{ .Values.customer }}
  namespace: mindroom-instances
  labels:
    app: mindroom
    customer: {{ .Values.customer | quote }}
spec:
  accessModes:
  - {{ .Values.storageAccessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.storage }}
  storageClassName: {{ .Values.storageClassName | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: synapse-storage-{{ .Values.customer }}
  namespace: mindroom-instances
  labels:
    app: synapse
    customer: {{ .Values.customer | quote }}
spec:
  accessModes:
  - {{ .Values.synapseStorageAccessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.storage }}
  storageClassName: {{ .Values.storageClassName | quote }}
