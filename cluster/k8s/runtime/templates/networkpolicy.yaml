{{- if and (eq .Values.workers.backend "kubernetes") .Values.workers.kubernetes.networkPolicy.create }}
{{- $networkPolicy := .Values.workers.kubernetes.networkPolicy -}}
{{- $dns := $networkPolicy.dns | default (dict) -}}
{{- $dnsEnabled := true -}}
{{- if hasKey $dns "enabled" -}}
{{- $dnsEnabled = $dns.enabled -}}
{{- end -}}
{{- $publicInternet := $networkPolicy.publicInternet | default (dict) -}}
{{- $publicInternetEnabled := true -}}
{{- if hasKey $publicInternet "enabled" -}}
{{- $publicInternetEnabled = $publicInternet.enabled -}}
{{- end -}}
{{- $publicInternetExcept := get $publicInternet "except" | default (list) -}}
{{- $publicInternetPorts := $publicInternet.ports | default (list 80 443) -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mindroom-runtime.workerNetworkPolicyName" . }}
  namespace: {{ include "mindroom-runtime.workerNamespace" . }}
  labels:
    {{- include "mindroom-runtime.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      mindroom.ai/component: worker
      app.kubernetes.io/managed-by: mindroom
      app.kubernetes.io/name: mindroom-worker
      {{- with .Values.workers.kubernetes.extraLabels }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace | quote }}
          podSelector:
            matchLabels:
              {{- include "mindroom-runtime.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.workers.kubernetes.port }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace | quote }}
          podSelector:
            matchLabels:
              {{- include "mindroom-runtime.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.runtime.apiPort }}
    {{- if $dnsEnabled }}
    - to:
        {{- toYaml $dns.to | nindent 8 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- if $publicInternetEnabled }}
    - to:
        - ipBlock:
            cidr: {{ $publicInternet.cidr | default "0.0.0.0/0" | quote }}
            {{- with $publicInternetExcept }}
            except:
              {{- toYaml . | nindent 14 }}
            {{- end }}
      ports:
        {{- range $publicInternetPorts }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    {{- with $networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
