name: Build MindRoom
# Builds MindRoom instance images in parallel using native ARM64 runners

on:
  # Validate MindRoom images on direct pushes to main.
  push:
    branches: [ main ]
  # Build (no push) on PRs to validate Dockerfiles
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'frontend/**'
      - 'local/instances/deploy/Dockerfile.*'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/build-mindroom.yml'
  # Publish release images when dispatched by the CalVer release workflow.
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Release tag to publish, for example v2026.4.261'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # Build each image/platform combination in parallel using native runners
  build:
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        target:
          - image_name: mindroom
            dockerfile: local/instances/deploy/Dockerfile.mindroom
          - image_name: mindroom-minimal
            dockerfile: local/instances/deploy/Dockerfile.mindroom-minimal
        platform:
          - linux/amd64
          - linux/arm64
        include:
          # AMD64 builds on standard runners
          - platform: linux/amd64
            platform_suffix: amd64
            runner: ubuntu-latest
          # ARM64 builds on native ARM runners (free for public repos)
          - platform: linux/arm64
            platform_suffix: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}
        lfs: true

    - name: Pull Git LFS objects
      run: git lfs pull

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        buildkitd-flags: --debug
        driver-opts: |
          network=host

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set build vars
      id: vars
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          ref_name="${{ inputs.release_ref }}"
          if [[ "$ref_name" != v* ]]; then
            echo "release_ref must be a tag starting with 'v', got '$ref_name'" >&2
            exit 1
          fi
          version="${ref_name#v}"
        elif [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "push" ]]; then
          ref_name="$GITHUB_REF_NAME"
          version="0.0.0"
        else
          echo "Unsupported event for Build MindRoom: ${{ github.event_name }}" >&2
          exit 1
        fi

        echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
        # Sanitize ref for Docker tag usage (e.g. pull/123/merge -> pull-123-merge)
        echo "safe_ref=${ref_name//\//-}" >> $GITHUB_OUTPUT
        echo "version=$version" >> $GITHUB_OUTPUT

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ matrix.target.dockerfile }}
        platforms: ${{ matrix.platform }}
        push: ${{ github.event_name == 'workflow_dispatch' }}
        tags: |
          ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:${{ matrix.platform_suffix }}
          ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:${{ steps.vars.outputs.safe_ref }}-${{ matrix.platform_suffix }}
          ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:${{ steps.vars.outputs.timestamp }}-${{ matrix.platform_suffix }}
        build-args: |
          VERSION=${{ steps.vars.outputs.version }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:buildcache-${{ matrix.platform_suffix }}
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:buildcache-${{ matrix.platform_suffix }},mode=max
        provenance: false
        sbom: false

  # Create multi-arch manifests after all builds complete when publishing is enabled.
  manifest:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    strategy:
      matrix:
        target:
          - image_name: mindroom
          - image_name: mindroom-minimal

    steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set safe ref
      id: vars
      run: |
        ref_name="${{ inputs.release_ref }}"
        if [[ "$ref_name" != v* ]]; then
          echo "release_ref must be a tag starting with 'v', got '$ref_name'" >&2
          exit 1
        fi
        echo "safe_ref=${ref_name//\//-}" >> $GITHUB_OUTPUT

    - name: Create and push latest manifest
      run: |
        # Keep latest aligned with explicit publishes.
        docker manifest create \
          ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:latest \
          ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:amd64 \
          ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:arm64

        docker manifest push ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:latest

    - name: Create and push ref manifest
      run: |
        # Publish the event-specific tag (e.g. main or a release version).
        docker manifest create \
          ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:${{ steps.vars.outputs.safe_ref }} \
          ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:${{ steps.vars.outputs.safe_ref }}-amd64 \
          ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:${{ steps.vars.outputs.safe_ref }}-arm64

        docker manifest push ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:${{ steps.vars.outputs.safe_ref }}

        echo "✅ Multi-arch manifest created for ${{ matrix.target.image_name }}"
        echo "Pull with: docker pull ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.target.image_name }}:${{ steps.vars.outputs.safe_ref }}"
