repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^skills/mindroom-docs/references/
      - id: check-docstring-first
      - id: check-yaml
        exclude: (cluster/k8s/.*/templates/.*\.yaml$|cluster/k8s/.*\.yaml$|cluster/k8s/.*/templates/.*\.yaml$|cluster/k8s/.*\.yaml$)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.11"
    hooks:
      - id: ruff-check
        exclude: docs/source/conf.py|ipynb_filter.py
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format
        exclude: docs/source/conf.py|ipynb_filter.py

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: .venv/bin/ty check
        language: system
        types: [python]
        files: ^(src/|tests/)
        pass_filenames: false
        args: [src, tests]

      - id: update-readme-docs
        name: Update README documentation
        entry: .venv/bin/markdown-code-runner README.md
        language: system
        pass_filenames: false
        files: ^(src/mindroom/commands\.py|README\.md)$

      - id: sync-config-models
        name: Push models from config.yaml to SaaS platform defaults
        entry: scripts/sync_config.py
        language: system
        pass_filenames: false
        files: ^(config\.yaml|saas-platform/default-config\.yaml)$

      - id: generate-skill-references
        name: Regenerate mindroom-docs skill references
        entry: .venv/bin/python .github/scripts/generate_skill_references.py
        language: system
        pass_filenames: false
        files: ^(docs/.*\.md|zensical\.toml|\.github/scripts/generate_skill_references\.py)$

      - id: check-tool-extras-sync
        name: Check tool extras stay in sync with pyproject.toml
        entry: .venv/bin/python .github/scripts/check_tool_extras_sync.py
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|src/mindroom/tools/.*\.py)$

      - id: tach-check
        name: Enforce narrow Tach boundaries
        entry: bash -c 'env -u VIRTUAL_ENV uv run tach check'
        language: system
        pass_filenames: false

      - id: privata
        name: Enforce module privacy
        entry: bash -c 'env -u VIRTUAL_ENV uv run privata .'
        language: system
        pass_filenames: false

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.1"
    hooks:
      - id: pyproject-fmt
        args: ["--table-format", "long", "--no-generate-python-version-classifiers"]

  # TypeScript/JavaScript hooks
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/.*\.(js|jsx|ts|tsx|json|css|scss|md)$
        exclude: ^(frontend/package-lock\.json|frontend/tsconfig.*\.json|.*\.min\.(js|css))$
        args: ["--cache", "--cache-location", ".cache/prettier-precommit.json"]
        require_serial: true

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.2.1
    hooks:
      - id: eslint
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        args: ['--fix', '--config', 'frontend/.eslintrc.json']
        additional_dependencies:
          - eslint@8.56.0
          - '@typescript-eslint/eslint-plugin@6.19.0'
          - '@typescript-eslint/parser@6.19.0'
          - 'eslint-plugin-react@7.33.2'
          - 'eslint-plugin-react-hooks@4.6.0'
          - 'eslint-config-prettier@9.1.0'
          - 'typescript@5.3.3'

  - repo: local
    hooks:
      - id: typescript-check
        name: TypeScript type checking
        entry: bash -c 'cd frontend && bun run type-check'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: check-bun-lock
        name: Check bun.lock is up to date
        entry: bash -c 'cd frontend && bun install --frozen-lockfile'
        language: system
        files: ^frontend/package\.json$
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
        files: ^frontend/.*\.json$
        exclude: ^(frontend/tsconfig.*\.json)$
      - id: pretty-format-json
        args: ['--autofix', '--indent=2']
        files: ^frontend/.*\.json$
        exclude: ^(frontend/package(-lock)?\.json|frontend/tsconfig.*\.json|frontend/\.eslintrc\.json)$
