exclude = ["**/*__pycache__", "**/*egg-info", "**/docs", "**/tests", "**/venv"]
source_roots = ["src"]

# ARCH-B memory enforcement slice: keep public memory config types owned by config.
[[modules]]
path = "mindroom.config.memory"
depends_on = []

# ARCH-B memory enforcement slice: keep memory consumers on the package facade.
[[modules]]
path = "mindroom.memory"
depends_on = [
    "mindroom.config.memory",
    "mindroom.matrix.client",
]

[[modules]]
path = "mindroom.matrix.cache"
depends_on = [
    "mindroom.matrix.cache.event_cache_events",
    "mindroom.matrix.cache.thread_cache_helpers",
    "mindroom.matrix.cache.thread_history_result",
]

[[modules]]
path = "mindroom.matrix.cache.thread_reads"
depends_on = [
    "mindroom.matrix.cache.thread_cache_helpers",
    "mindroom.matrix.cache.thread_history_result",
]

[[modules]]
path = "mindroom.matrix.cache.thread_cache_helpers"
depends_on = []

[[modules]]
path = "mindroom.matrix.cache.thread_history_result"
depends_on = []

[[modules]]
path = "mindroom.matrix.cache.thread_write_cache_ops"
depends_on = ["mindroom.matrix.cache"]

[[modules]]
path = "mindroom.matrix.cache.event_cache_events"
depends_on = []

[[modules]]
path = "mindroom.matrix.cache.thread_writes"
depends_on = [
    "mindroom.matrix.cache.event_cache_events",
    "mindroom.matrix.cache.thread_write_cache_ops",
]

[[modules]]
path = "mindroom.matrix.conversation_cache"
depends_on = [
    "mindroom.matrix.cache",
    "mindroom.matrix.cache.thread_history_result",
    "mindroom.matrix.cache.thread_reads",
    "mindroom.matrix.cache.thread_write_cache_ops",
    "mindroom.matrix.cache.thread_writes",
    "mindroom.matrix.client",
]

[[modules]]
path = "mindroom.runtime_support"
depends_on = ["mindroom.matrix.cache"]

[[modules]]
path = "mindroom.bot_runtime_view"
depends_on = ["mindroom.matrix.cache"]

[[modules]]
path = "mindroom.matrix.client"
depends_on = [
    "mindroom.matrix.cache",
    "mindroom.matrix.cache.thread_history_result",
    "mindroom.matrix.conversation_cache",
]

[[modules]]
path = "mindroom.conversation_resolver"
depends_on = ["mindroom.matrix.client", "mindroom.matrix.conversation_cache"]

[[modules]]
path = "mindroom.commands.handler"
depends_on = [
    "mindroom.matrix.conversation_cache",
    "mindroom.scheduling",
    "mindroom.tool_system.runtime_context",
]

[[modules]]
path = "mindroom.scheduling"
depends_on = [
    "mindroom.hooks.sender",
    "mindroom.matrix.client",
    "mindroom.matrix.conversation_cache",
]

[[modules]]
path = "mindroom.tool_system.runtime_context"
depends_on = ["mindroom.matrix.conversation_cache", "mindroom.scheduling"]

[[modules]]
path = "mindroom.thread_summary"
depends_on = ["mindroom.matrix.client", "mindroom.matrix.conversation_cache"]

[[modules]]
path = "mindroom.streaming"
depends_on = ["mindroom.matrix.client", "mindroom.matrix.conversation_cache"]

[[modules]]
path = "mindroom.post_response_effects"
depends_on = ["mindroom.matrix.conversation_cache", "mindroom.thread_summary"]

[[modules]]
path = "mindroom.hooks.sender"
depends_on = ["mindroom.matrix.client", "mindroom.matrix.conversation_cache"]

[[modules]]
path = "mindroom.turn_controller"
depends_on = [
    "mindroom.commands.handler",
    "mindroom.matrix.cache",
    "mindroom.matrix.conversation_cache",
]

[[modules]]
path = "mindroom.knowledge"
depends_on = [
    "mindroom.knowledge.manager",
    "mindroom.knowledge.shared_managers",
    "mindroom.knowledge.utils",
]

[[modules]]
path = "mindroom.knowledge.chunking"
depends_on = []

[[modules]]
path = "mindroom.knowledge.startup"
depends_on = []

[[modules]]
path = "mindroom.knowledge.shared_managers"
depends_on = [
    "mindroom.knowledge.manager",
    "mindroom.knowledge.startup",
]

[[modules]]
path = "mindroom.knowledge.manager"
depends_on = [
    "mindroom.knowledge.chunking",
]

[[modules]]
path = "mindroom.knowledge.utils"
depends_on = [
    "mindroom.knowledge.manager",
    "mindroom.knowledge.shared_managers",
]

[[interfaces]]
expose = [
    "KnowledgeAccessSupport",
    "KnowledgeManager",
    "ensure_request_knowledge_managers",
    "ensure_shared_knowledge_manager",
    "get_agent_knowledge",
    "get_shared_knowledge_manager_for_config",
    "initialize_shared_knowledge_managers",
    "shutdown_shared_knowledge_managers",
]
from = ["mindroom.knowledge"]

# ARCH-B memory enforcement slice: expose only the config-level memory settings surface.
[[interfaces]]
expose = [
    "MemoryAutoFlushConfig",
    "MemoryBackend",
    "MemoryConfig",
]
from = ["mindroom.config.memory"]

# ARCH-B memory enforcement slice: expose the supported memory facade, not helper modules.
[[interfaces]]
expose = [
    "MemoryAutoFlushWorker",
    "MemoryPromptParts",
    "add_agent_memory",
    "auto_flush_enabled",
    "build_memory_enhanced_prompt",
    "build_memory_prompt_parts",
    "delete_agent_memory",
    "get_agent_memory",
    "list_all_agent_memories",
    "mark_auto_flush_dirty_session",
    "reprioritize_auto_flush_sessions",
    "search_agent_memories",
    "store_conversation_memory",
    "strip_user_turn_time_prefix",
    "update_agent_memory",
]
from = ["mindroom.memory"]

[[interfaces]]
expose = [
    "ConversationEventCache",
    "EventCacheWriteCoordinator",
    "THREAD_HISTORY_DEGRADED_DIAGNOSTIC",
    "THREAD_HISTORY_ERROR_DIAGNOSTIC",
    "THREAD_HISTORY_SOURCE_CACHE",
    "THREAD_HISTORY_SOURCE_DIAGNOSTIC",
    "THREAD_HISTORY_SOURCE_HOMESERVER",
    "THREAD_HISTORY_SOURCE_STALE_CACHE",
    "ThreadCacheState",
    "ThreadHistoryResult",
    "normalize_nio_event_for_cache",
    "thread_cache_state_is_usable",
    "thread_history_result",
]
from = ["mindroom.matrix.cache"]

[[interfaces]]
expose = [
    "ConversationEventCache",
    "ThreadHistoryResult",
    "normalize_nio_event_for_cache",
    "thread_history_result",
]
from = ["mindroom.matrix.cache"]
visibility = ["mindroom.matrix.conversation_cache"]
exclusive = true

[[interfaces]]
expose = ["ThreadReadPolicy"]
from = ["mindroom.matrix.cache.thread_reads"]
visibility = ["mindroom.matrix.conversation_cache"]
exclusive = true

[[interfaces]]
expose = ["ThreadMutationCacheOps"]
from = ["mindroom.matrix.cache.thread_write_cache_ops"]
visibility = ["mindroom.matrix.conversation_cache"]
exclusive = true

[[interfaces]]
expose = [
    "ThreadOutboundWritePolicy",
    "ThreadLiveWritePolicy",
    "ThreadSyncWritePolicy",
]
from = ["mindroom.matrix.cache.thread_writes"]
visibility = ["mindroom.matrix.conversation_cache"]
exclusive = true

[[interfaces]]
expose = ["_EventCache", "_EventCacheWriteCoordinator"]
from = ["mindroom.matrix.cache"]
visibility = ["mindroom.runtime_support"]
exclusive = true

[[interfaces]]
expose = [
    "ConversationCacheProtocol",
    "ConversationEventCache",
    "EventLookupResult",
    "MatrixConversationCache",
    "ThreadReadResult",
]
from = ["mindroom.matrix.conversation_cache"]

[[interfaces]]
expose = [
    "OwnedRuntimeSupport",
    "build_owned_runtime_support",
    "close_owned_runtime_support",
    "sync_owned_runtime_support",
]
from = ["mindroom.runtime_support"]
